body:
  text: 揚州石成金天基撰集金剛般若波羅蜜經般若音鉢惹後凡又遇同此註金剛是金中之精堅者剛生金中百煉不銷質極堅利不為物破而無物不破譬如智慧能絕眾生貪嗔癡一切顛倒執著之見也般若者梵語華言智慧性體虗融照用自在故云般若梵語波羅蜜華言到彼岸欲到彼岸須憑般若此岸者眾生作業受苦生死輪迴之地彼岸者謂諸佛菩薩究竟超脫清淨安樂之地經者徑也如一超直入也論波羅蜜有六種布施度慳貪持戒度淫邪忍辱度嗔恚精進度懈退禪定度散亂智慧度愚癡各占六度之一惟一般若能生八萬四千智慧則六度兼該萬行俱備佛言多梵語姚秦三藏鳩摩羅什奉詔用中國語翻譯此經指明後學功誠大矣講人亡真性本是虗靈不昧歷劫常存惜為物欲昏蔽所以沉淪於生死苦海未能脫離我佛慈悲持說此經猶乘筏渡津以至彼岸也所謂金剛者葢萬物能逃乎五行而五行之中惟金最堅利長久木有時而朽水有時而涸火有時而熄土有時而崩以金試之於木則能成器用沉之於水則光湛常新投之於火則百煉愈精埋之於土則永劫不壞其位在西北能摧折一切萬物人能用之於身可以斬一己之邪魔誅萬里之妖怪儒有龍泉寶劍安定國道有青蛇寶劍斷絕情慾佛有金剛寶杵降伏魔王大易以乾為首玄門以金丹為首此經以金剛為首得此般若經者證西方無量壽果西方金方也金之為義大矣哉故以金剛為喻般若者智慧也人生日用間圖名貪利奸偽百出至死心尚不足自以為乖巧伶俐不知溺於輪迴苦海真癡愚人也必以智慧打破癡愚獨稟乾剛勇猛精進明了自性豈不到彼岸與諸佛同享快樂哉總之金剛喻也般若法也波羅蜜證果也法會因由分第一如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘眾千二百五十人俱祇音奇比音被註如是者此也我者結集經者自謂也言如此之法我親從佛聞之非臆說也一時者說此般若之一時佛者覺也自覺覺他覺行圓滿故名曰佛舍衛國波斯匿王之國祇陀王之太子也樹是祇陀所施故名祇樹給孤獨園者王之宰臣名須達拿常在此園賑濟貧人故名給孤獨園梵語比丘華言乞士謂上乞法於佛以明己之真性下乞食於人以為世人種福葢佛將說真空無相妙理必得道之深者方能領悟豈小比丘所能與哉千二百五十人即孔門三千徒眾也俱者同處也爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐著俗作着已音以飯食音反四敷音孚註爾時者彼一時也世尊者舉世之人所共尊敬食時正當午時也洗足以佛行則跣足敷者設也論佛是金輪王子誰無供養之者而猶如此乞食欲使後世緇徒不植資產去此貪心折其驕亢以煉種性正君子謀道不謀食也講爾時世尊於午可以乞食之時於是着僧伽之衣持四天王所獻之鉢因祇陀園在城外自外而入舍衛城中以次第而乞焉不越貧以從富不捨賤以從貴大慈平等無有選擇乞食既畢還歸給孤獨園飯食已完將入禪定於是收拾其衣鉢使心無係累也洗其足以潔其身也乃排布高座而坐而說法之原因起矣善現起請分第二時長老須菩提在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊著同着註眾弟子之中惟德尊而年高者謂之長老此須菩提即善現又名空生尊者希少也希有讚佛之辭即自生民以來未有孔子之義講須菩提在大眾中即從自己座位起身整頓威儀袒其右肩以示不敢倍乎師屈其右膝以示不敢左乎道合掌以示其皈依恭敬以示其嚴肅而啟白於佛以伸問辭先讚而後呼之曰舉世所少有者我世尊也如來善護念諸菩薩善付囑諸菩薩註如來佛之總稱如而不生來而不滅即我真性之體用單修智慧曰菩單修福業曰薩福慧雙修曰菩薩諸菩薩指會下學道之人講須菩提稱讚佛曰如來起慈悲心善能衛護眷念此會中之眾菩薩使之信受又善能以此佛法付委囑托於人使之奉行也世尊善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心阿讀倭應因音註阿訓無耨多羅訓上三訓正藐訓等菩提訓覺乃無上正等正覺即我之真性也此真性包含太虗孰得而上之故云無上然上自諸佛下至蠢動此性正相平等故云正等其覺圓明普照無偏無虧故云正覺應者當也云何者如何也住者止也降伏者制禦之謂也論阿耨多羅三藐三菩提即無上正等正覺即是佛即是如來即是金剛般若波羅蜜只此九字若能悟明就得成佛講須菩提問佛曰世間若有善淑男子并女人學道之初先發此無上菩提之佛心當如何常住而使之不退轉妄心一起當如何降伏而使之不惑亂我真心也佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說為音位證諦聽仔細聽也講佛因須菩提啟問其言甚善便重言善哉善哉以歎美之汝以如來善護念善付囑只此兩句善發我未發之言汝當詳審而聽吾當為汝說此住佛心降妄心之道善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞唯音委樂音要註唯領諾也然是其言也既諾而然之又稱世尊以表深願也願樂欲聞如蜂思好蜜渴想甘露傾心側耳莫可形容也論發此心者究竟無上菩提之心也凡人一心不昧萬法皆通但迷則順此心謂之無明悟則逆此心謂之智慧立大圓鏡空如來藏建大法幢度無量眾皆不出此講人之一心明從往來攻取日眾最難發此菩提覺心若善男善女既發此一念則滿腔中純是天理真如本性自然顯露自然常住不滅吾見五蘊皆空如是一切妄心不待驅除而自降伏矣所謂道心為主人心退聽也譬如日光一照黑暗盡明須菩提即領諾其言稱世尊曰弟子願聞佛之教大乘正宗分第三佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切眾生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想眾生音中生註摩訶者廣大之稱若者或也論世法上說胎卵濕化指人與鳥獸魚蟲等物為欲界色界色想無色想指無色界非想等天皆名曰眾生且與降伏其心句義相悖不知眾生者指人心之眾生也自性眾生誓願度又何說之六祖以眾生指心言極妙講佛告須菩提說諸大菩薩以如是之妄心欲其降伏而使菩提真心頓然發現者果何道以致之葢人一身悉皆五陰六識遮隔我之真性故種種一切眾生妄心極難降伏何以見之或有心易輕舉飛揚遠適謂之卵生心常流轉習氣深重謂之胎生心隨邪見沉淪不省謂之濕生心見景趣遷變起幻謂之化生執相修因頓起邪思名為有色內守頑空不修福慧名為無色滯諸聞見係念染著名為有想靜沉死水猶如木石名為無想起生滅見落兩頭機名非有想非無想然此九種眾生心皆非菩提真心一或有之死即隨類受生墮於胎卵濕化之物虗空等神天魔等鬼所以輪迴六道難入涅槃者也我皆令入無餘涅槃而滅度之令平聲涅音年入聲註我者佛自謂也皆者盡也令者使也入者行至於內也無餘無滲漏也梵語涅槃此云無為無餘涅槃大涅槃也滅消滅也度化度也論人有虗靈之性包括天地謂之真空又名法身亘古亘今所不能滅即大禹見黃龍負舟自言生寄也死歸也四大色身原是假合豈無毀壞之理愚人不能明心見性所以死歸陰趣隨業受生遷轉不已聖人明覺了然如虗空杲日常天普照或出應世則為報身化身隨緣或不住世則棄四大如棄敝屣永證清靜法身寂然常樂是其來也從體起用無所從來其去也攝用歸體亦無所去豈非涅槃常住不滅哉世人不知誤以為死非也講佛之意葢說如前所謂一切眾生妄心皆不是我菩提覺心我皆令此受學諸大菩薩將此妄心入於清淨無為之鄉消融其滓穢度脫其染著如紅爐點雪必使人欲淨盡纖毫不留深造於玄默之境所謂心外無餘道道外無餘樂也證楞伽經云涅槃乃清淨不死不生之地一切修行者之所依歸列子曰生之所生者死矣而生生者未甞終裴相國云寂靜常樂故曰涅槃如是滅度無量無數無邊眾生實無眾生得滅度者講佛說如是以前所言滅度之道使般若智慧打破種種邪見煩惱故此無限量無計數無邊際一切眾生之心今已滅度無餘者豈我真能使之令入涅槃而滅度之哉葢以凡人原有此無上菩提之心只為迷而不悟今心地一旦豁然開朗頓見本性空寂是乃自性自度本來無此眾生妄心曷得而滅度之證淨名經云一切眾生本性常滅不復更滅六祖壇經云自性自度名為真度何以故須菩提若菩薩有我相人相眾生相壽者相則非菩薩相去聲註相者形迹也執著形迹心不虗空滯而不化謂之有也論此經自始至終總以四相為張本反覆言之講夫無有眾生得滅度者此何以故也葢自性本空無有我人眾生壽者之形方是無上菩提之心若或有此四相則前一切眾生妄心安能滅度以至涅槃哉決非菩薩地位中人矣世間未有一人不自愛其身者終日營營爭名奪利為一身計又為子孫計皆是我相也見人勢利攀援不已見人萎弱嗔壓不已嫉人之有吝人之求皆是人相也色受想行計其和合貪嗔癡愛汩沒靈源此眾生相也焚香禱祝為求現在福田煉藥燒丹希覬長生不老此壽者相也證圓覺經云未除四種相不得成菩提妙行無住分第四復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相施音是註復還也次再也還復再與須菩提言之住着也論世法上論布施檀波羅蜜為六度之首是修行中一大事但此布施乃談心要如來於日用間從自性中起用廣布設施於外不住着於有相決非外人捨施之說也六度註見第一葉講佛再與須菩提說菩薩於所行之事當無所執着而為敷布設施何以見之眼之悅於色耳之樂於聲鼻之臭於香舌之甘於味身之觸於慾心之校量分別於其法皆有相之運用與眾生何異豈是我性中本有之福德哉菩薩於自心眾生捨其所貪歸於空寂不於六根六塵上有所係累拘執但自性虗通妙圓明淨隨感而應不住於相也何以故若菩薩不住相布施其福德不可思量講所以然者如何若有學道的菩薩不泥着色聲香味觸法之根塵以為運用則是所有善根純熟圓滿永得無上菩提之道其福德量等虗空豈人之心思可得而測度忖量哉非享福報之謂也須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住凡問之不字音否凡答之不字音弗註東西南北四維上下總謂之十方虗空者太虗之中無有纖毫隔礙蕩然空朗非心思可能度量論六根圓通四虗無礙東看皆西南觀皆北上俯皆下下仰皆上不立中邊有何四維既無界畫何可度量無能施彼無所施此如如自在湛若十方空以無所住住是太虗空福德性應如是住矣講佛問須菩提於汝心中自謂如何如十方虗空可以心思度量不須菩提答云不可思量葢大莫大於虗空非人之所能測度佛又明說無住相布施之福德亦如虗空不可以思量也既而佛又呼其名而以告之汝諸菩薩之學道者不必別處更求道之下落但當依我所教於汝無住相布施之理便就此止應用之間湛若十方空無所住而住可也證六祖曰不住是菩薩住處如理實見分第五須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所說身相即非身相註身相者色身也即孟子所謂形色也非身相者法身也即孟子所謂大體也此如來吾真性佛也論吾之真性如來湛然常住本無生滅無相之可見者也若要見之外不見有山河大地內不見有見聞覺知舌頭上無十字關脚跟下無五色線千聖喚不回頭百鳥都無尋處忽然豁開正眼大地浩流即見本來面目講佛問須菩提曰於汝之意所云維何可以身相見如來不須菩提解其意乃答之曰不也世尊不可以身相得見如來何故不可以身相見之葢如來所說身相不過形體之末非真空無相之道豈可指而謂之真如來哉即非身相也證莊子曰不形之形川曰身在海中休覔水佛告須菩提凡所有相皆是虗妄若見諸相非相則見如來註非字莫作無字解非字活無字呆下同論凡所有相皆是虗妄猶之吾儒不以形體求聖人而求吾心中之聖人也講佛之心欲人見自性佛故告須菩提曰世間凡有形相之可見者皆是假合變幻不是汝本有真實的理雖有所見亦妄見也汝若凡見諸相便識破非我真實本相必無執相迷真之大自能迴光返照即見色身中有法身自性之如來隨處顯現矣而如來豈可外求乎證刊定記云執相迷真對面千里虗心體物天地一家道川頌曰有相有求俱是妄無形無見隨偏枯堂堂密密何曾間一道寒光爍太虗正信希有分第六須菩提白佛言世尊頗有眾生得聞如是言說章句生實性不講須菩提恐後之人聞法不能信受乃白佛曰世尊之所說皆大乘正宗之教菩薩未有不信受而奉行之苟末世凡夫名眾生者得聞如是真空無相之言其言說中之章句果能實信之否也證學道之人不可無此信孔子曰篤信好學玉樞經曰道以誠而入華嚴經曰信為萬物功德母長養一切諸善根智度論云佛法大海信為能入佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根無量音無亮註持戒者諸惡莫作也修福者眾善奉行也講佛告須菩提汝莫作生實信否之說然此無相真空妙理必有大根基的善人方能信任其道豈同小可設或佛滅後到五百歲之時有人持守戒律而諸惡莫作廣修福田而眾善奉行又能於此經中之一章一句信之於心鑿鑿皆真實語則此人之善根培植甚厚豈於一佛二佛三四五佛種此善根哉當於無量千萬佛所中發生得來非止淺淺根基所得也證六祖曰信般若波羅蜜能除一切煩惱信般若波羅蜜能成就一切出世功德信般若波羅蜜能出生一切諸佛刊定云根有生長義聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸眾生得如是無量福德註世間所享者名福報信此經者名福德講佛又告須菩提若有此善根之人聞得此經之章句乃至一念之中淨焉而心不亂信焉而心不疑生此淨信心者我能盡知盡見此人雖名為眾生而持戒修福之德善根受用不盡其福德豈有限量哉何以故是諸眾生無復我相人相眾生相壽者相無法相亦無非法相論佛先教學者能生信心以此為實又恐學者徒泥言說不求心得所以云無法相又恐學者執着無法不去探討其言以悟真理故又云無非法相只此兩句有多少圓活妙理此其所以為佛也講佛言是諸眾生何故得如此之福德其實善根純熟悟得真空無相之理無復有我人眾生壽者之四相亦無有執着此經之章句實信其言說落於有見而為法相亦無有一向沉空守寂落於無見而為非法相也不着二邊方是真空何以故是諸眾生若心取相則為著我人眾生壽者若取法相即著我人眾生壽者何以故若取非法相即著我人眾生壽者是故不應取法不應取非法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法註我人眾生壽者盡天地間眾生所有之情狀盡不出此四者之中非法者無法也淪於頑空講前節眾生既無有此四相心中無纖毫染着所以信此經而得福德矣佛又反言之此何以故也是諸眾生苟或心不虗空便落我人眾生壽者之形迹此人之所易曉也至於我說無法相者以吾真如本體不在言語文字之間汝若取法相就是與前執着四相者其心一般至於非法則無相矣我亦謂非法相者又何故也葢法界之內理與事原不相礙汝若取非法相謂之曰無記空又謂之曰斷滅見此心不化與前着四相者又何異焉是故當以此兩頭見直須截斷不應執其有法而取以為有亦不應執其非法而取以為無則太虗之中渾無偏倚湛然形迹兩忘矣以此之義亦有原故佛嘗謂汝學道等人當知我與汝說此法者因汝諸人有此四相不能了悟真空超於彼岸我不過假此法門令汝度脫生死苦海汝既見自本性證涅槃樂則我之法當棄之無所用矣譬如編竹成牌渡人過水到岸則此筏亦捨之也夫有法既捨矣何況非法又可執着於無沉空守寂哉能不着於無則空而不空自無非法相也證儒書曰得意忘言得心忘象道書曰得魚忘筌得兔忘蹄傅大士曰渡河須用筏到岸不須船無得無說分第七須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶註耶者疑辭也菩提之心此是如來本性亦人之所同具當體即是豈自外而得待言而求哉講前章既說法相非法相矣佛恐須菩提尚未透徹故又設此問呼其名而告之曰汝之意何如以我如來無上菩提之法果有所求而得之於己耶抑以此法諄諄然有所說而教之人耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說解去聲音械註解者曉也定者泥於一處而不通也講須菩提云如我心中悟佛所說之義理則知無上正等正覺之法此吾本來真空人人所具足者也不過各自默契而已未嘗指定一處而標其名曰這是菩提之法也然佛所說不過隨機設教何嘗指定一法以教人必如是而後修哉如來不盡廢法只無定法可名如來不盡廢言只無定法可說證永曰佛說一切法為除一切心我無一切心何用一切法何以故如來所說法皆不可取不可說非法非非法講須菩提云如來之法無定名亦無定說者此其故何也葢如來所說者無上菩提法也可以心悟而不可以色相中取一有所取心則馳於外求可以心傳而不可以言語中擬一有言說則泥於口耳皆不可也然是法也若執為有法而吾性虗靈莫測果何言有非有法也若執為着無法而吾性隨感即應果何言無又非非法也真空不空其以是歟證川禪師曰恁麼也不得不恁麼也不得恁麼不恁麼總不得所以者何一切賢聖皆以無為法而有差別差音雌註賢者若須陀洹阿羅漢之類聖者佛也無為法者自然覺性不假人為之法也差者參差不齊也論此無為法者即是無上菩提即是涅槃即是如來即是無相即是無住即是金剛般若波羅蜜也有為法世間法也無為法出世間法也後學往往把無為兩字認作空寂一向灰心稿形只說我即是佛故今時無為道人極多此真捕風捉影頑愚不靈之人也葢人有做作皆是勉強若我真性之運用皆自然而然何曾有所作為哉講須菩提云我前所謂無可取無可說者何以見之葢無上菩提之法皆我自然覺性無假人為故一切賢聖皆同此無為之法但法本無為悟有遲疾賢人得道之淺者或假言說而後自悟聖人得道之深者頓悟頓修本來無說故有差別不同等爾及其成功則一也此如來之所說法無定在也證莊子曰無為而無不為華嚴經疏曰寂寥於萬化之域動用於一虗之中依法出生分第八須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不註三千大千形容其多也世界者世間之方位界限也三千大千統言一大世界也這個布施作捨施看與前篇無相布施不同七寶者金銀瑠璃珊瑚瑪瑙珍珠玻璃也論此段初言三千不即恒河自少至多也講佛將以此持經功德開示學人故先設言呼須菩提而告之設或有人充滿三千大千世界之七寶用之以布施此人所獲福德多乎不多須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多講須菩提答云七寶布施其福德甚多何以言之葢是福德乃有相之施於我性中真空無相妙法全不相關必竟非福德性故如來所言福德者乃人天小果之因此所以為多也若復有人於此經中受持乃至四句偈等為他人說其福勝彼註復者再也信力曰受受之不忘於心也念力曰持持之不厭其久也受持者承教不逆結念不息也經指金剛義也說謂廣說經義令人普得聞知論古今以來解四句偈者紛紛不一惟中峰謂經中凡言四句偈必上有乃至字下有等字言於此經中受持一句二句乃至四句偈此說最為穩當要知經完一切有為法之四句者竟是講佛言如再有人於此經中乃至四句偈等直下承受其理又拳拳持守於心而不失更為他人解說其義則是自利利他所獲之福勝於彼之七寶布施者多矣葢彼乃住相布施縱得濁福福盡隨落此乃因經悟性福等大虗歷劫不壞其福安得不勝彼哉證永嘉證道歌曰住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法註非佛法即前云無為法即後云無法可說之意論一心泯合非佛非法為不住相布施也講佛言人能受持講說是經其福勝彼者此何以故也葢真空無相之理是諸佛之本性即無上菩提之妙法也從上以來一切諸佛之多并一大藏經之法皆自此經流出求其直指全體未有若此之明且盡者此外更無餘經矣佛又恐人泥於阿耨專為佛法又曰所謂佛法者本來無有不過假此開悟眾生使之言下見性乃虗名為佛法也故曰即非佛法證老子曰大道無名強名曰道一切無相分第九須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹洹音丸註梵語須陀洹此云入流入聖人之流也我者指須陀洹而言非佛自謂也論四果者皆是修行菩薩得道之淺深也三乘根性所悟所證隨異此四果次第而修則無上菩提可到若萌有得之心即著四相自足而不復上進矣我佛恐四果菩薩不知以無念為宗故設四問講佛問須菩提曰須陀洹作此念頭自謂我必要造到此地位如樹之結果相似有所得之心否須菩提知其不然乃曰須陀洹不萌得果之心何也葢彼已造入無相之門得與聖人之流但不能頓悟真空無所入於精微奧妙也僅能強制其欲不入六塵之境界耳是名之為初果也須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含註梵語斯陀含此云一往來論斯陀含在世法上說一往天上一來人間六祖曾說破云前念起妄後念即止前念有着念後即離名曰斯陀含據理而言人之妄念往來於心中者無一時能止往即出乎妄念時而妄念又或一來本性未能寂滅故也講佛又問之曰斯陀含動箇念頭自謂我必得乎此果否須菩提即不然云斯陀含心已造到至靜之地但目覩諸境此心還有一生一滅名一往來而實無第二生滅謂前念纔着後念即覺故無往來即謂斯陀含之所由名歟須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含阿那俱平聲註梵語阿那含此云不來亦名出欲講佛又設問之曰阿那含作此念頭自謂我有得果之心否須菩提即不之云阿那含心空無我已斷塵識思惑外不見有可欲之境名為不來矣謂之曰為不來即此為字諸法尚未空寂此心尚未融貫其實無有不來之妙未免強制也此已造到佳境矣非阿那含之謂乎須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人眾生壽者世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢我不作是念我是離欲阿羅漢註梵語阿羅漢此云無諍葢有欲則有爭此既離欲何諍之有又云殺賊殺去無明煩惱思惑又云不來此必已證無為之體諸漏已盡自無生滅道者得無相之理非徒果也梵語三昧此云正受亦云正見論徐士英註曰大易所謂窒欲窒則未免費力孟子所謂寡欲寡則去猶未盡今世尊所謂離欲則於人欲灑然離脫矣此言真有喫緊為人處講佛又問之曰阿羅漢作箇念頭自謂我得這箇道否須菩提知其不然而即否之曰阿羅漢性本自空實無一法可得也設若阿羅漢作得道之念是所得心猶未除即着人我等四相矣須菩提又拈出平日所得佛說而印證之曰世尊佛當日曾說我須菩提一念不生諸法無諍得此之正見於諸弟子中許我為第一必定是我脫盡人欲斷絕此念方是許我為離欲阿羅漢也證若訥禪師曰無諍者涅槃經云須菩提住虗空地若有眾生嫌我立者我當終日端坐不起嫌我坐者我當終日立不移處即此義也世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行樂音要行音恨註樂者愛也即孔子曰仁者樂山之謂梵語阿蘭那此云無諍謂其無人我行也萌之於心曰念見於修為曰行實無所行者古註云本性空寂雖隨緣赴感而實無所行此說得之論四果中皆有無字乃無為之法所謂一切賢聖皆以無為法而有差別於此可證徐士英註曰佛之有四果猶孔子之有四教但佛所說四果自有等級第一云不入色聲香味觸法則是知欲境當避此果之初生第二云一往來則是蹈欲境不再此果之方碩第三云不來則是去欲境如遺此果之已熟第四云離欲則是脫然無纖欲可除此果之既收伊川謂釋氏有上達而無下學以此觀之亦是下學上達處此言最當然漸教所以如此若是無上菩提頓悟真空即此金剛般若波羅蜜超入佛地也又何四果之足云講須菩提恐大眾不知去所得心故又詳言曰我若是作此思念而必欲得阿羅漢道則又生一妄想安得六欲頓空佛即不於諸大弟子中說我須菩提是好樂寂靜之人有是無諍之行也何以見之以我須菩提外雖所行心中無一可得無我無人其實無此樂阿蘭之行方纔名我須菩提為樂阿蘭那行也莊嚴淨土分第十佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得註然燈佛即定光佛也乃釋迦佛授記之師論佛自謂成佛實無所得證前四果之無所得夫無相之理乃我自有之真性其成佛皆由我心之自悟而得也豈假師授言傳而後成哉講佛恐諸菩薩所得心未除執着住於有法不生清淨心故設是問告須菩提曰我當初於然燈佛處得成無上菩提之道果然得本師之法不須菩提即解其意曰不也世尊如來雖在本師處聽法不過因師開導實乃自悟自修本來無有何曾有法可得以是得之於心傳也證寒山詩曰常聞釋迦佛先受然燈記然燈與釋迦祗論前後智前後體非殊異中無一異一佛一切佛心是如來地須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴土讀度講世間所謂莊嚴者造寺作塔行種種善事是有相莊嚴也佛恐人認做這樣莊嚴故呼須菩提而謂之曰菩薩於佛土之中果作善緣福業還莊嚴不須菩提據理以答之不也世尊何以故也佛所謂莊嚴者即非外貌相好之莊嚴必其心地明潔如太虗中萬行俱足此所以名為莊嚴也是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心註應者當也諸菩薩指大修行人而言也無所住不住着在一處凝滯不化也葢此心神明莫測變化無窮是真淨土也不清淨則逐境遷移放逸莫檢便着六塵而多能所矣論心若有住則為有物所以佛說應無所住正欲人不住色聲香味等六塵惟應無所住而生清淨也心無所住則絲毫不掛萬境澄徹即清淨也譬若百花林裡過一葉不沾身又若一鏡當空無所不照何等清淨如先着一物則空明遮蔽焉能照物黃梅夜授至此六祖言下大悟講佛告須菩提曰菩薩莊嚴既不在於外飾則當反而求之於心使泰宇之中湛然常虗無一毫染濁靈臺之內寂然常定無一絲擾亂當如是生清淨心不當住在色聲香味觸法上生心便為六塵所縛妄念旋起鮮能清淨矣爾當知此清淨心妙湛圓寂不泥方所本無所住也於無所住而生其心如明鏡當前物來悉照物去即空自然十分清淨是淨土莊嚴孰甚焉證六祖聞應無所住而生其心即大悟曰何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本無搖動五祖曰不識本心學法無益若言下識自本心見自本性即名丈夫大人須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身註須彌山高廣三百三十六萬里為眾山之王以此喻人身之大不過假設其詞如七寶滿三千大千之類論徐士英曰此分凡四段純是釋氏說心處第一段謂本心之善能自覺悟不是從他人處得來第二段謂涵養此心須用持敬第三段謂打破敬字全是人欲須當清淨此心莫使一毫人欲染着第四段生出一件譬喻言此心之大包括宇宙萬化皆從此出雖須彌山王不足以喻其大此說極當講佛恐須菩提錯認色身為大不知心為大又為之辨論譬如有人身如須彌山王可以言大否須菩提深悟佛意乃以甚大對之何以見之色身雖大如須彌山王為有生滅必竟不名大身佛說非身纔是我之清淨本心乃真法身也此心包廓太虗周藏沙界無相無住頓入圓明豈須彌山所能比量哉是名為大身也無為福勝分第十一須菩提如恒河中所有沙數如是沙等恒河於意云何是諸恒河沙寧為多不須菩提言甚多世尊但諸恒河尚多無數何況其沙註西土有河名曰恒河從阿耨池東流出周迴四十里沙細如佛多在此處說法故取以為喻西土只有一箇恒河焉有許多恒河亦是假說之言如須彌山王之說講佛以眾人之所易見者先反詰之恒河多沙固多矣設或不止一恒河數其如沙之多恒河是諸恒河多乎不多須菩提答言甚多但諸恒河且多而無數何況河中之沙乎言多而又多也佛設此喻以為較量福德多寡之張本須菩提我今實言告汝若有善男子善女人以七寶滿爾所恒河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德講佛謂須菩提我今以朴實言語告汝若有善男女以七寶等物滿爾所謂恒河沙數盡三千大千世界布施與人所得之福多乎不多須菩提即以甚多答之佛又再呼而告之曰若有善男善女於此經中乃至四句偈等信而受之於心會其妙義而毫無所疑堅而持之於心存其精蘊而毫無所失必見自己真如菩提三智朗然備矣又能以此真空妙義為人解說使人聽聞之下心地開通明了自性可以脫離輪迴永超生死則是人己兼成自他俱利此其福即無為福也所獲利益之多豈恒沙布施者可同日語哉證華嚴經云譬如暗中寶無燈不可見此喻菩提妙道非佛法不至又喻佛法非參悟不明尊重正教分第十二復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟註隨者隨其所在之處也當知此處者謂此心也天者四天之類人者世間之人阿修羅有三種一屬天趣一屬人趣一屬畜生趣大槩如人爾唯嗔恨心重故托生於此六道中不言地獄餓鬼畜生者以三等之蠢昧不知其理故也講佛再謂須菩提云若或有人隨其所在便能演說此經之言乃至四句偈等之妙令諸聽者除迷妄心則一卷真經當知在此處身中矣自然感得天人阿修羅等皆來恭敬如佛之塔廟慇懃瞻禮可見此經此偈最上希有也何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處則為有佛若尊重弟子註受持註見前第二十五葉對文曰讀背文曰誦讀誦者口熟其文心解其義也講夫講說經中之義尚能感天龍八部供養如此何況有人盡能以此全經受持而體騐於心讀誦而研窮其義則此無相無住之理乃阿耨多羅三藐三菩提之法真最上而無以加也第一而無可比也又絕無而僅有也定知此人以一心而成就之得其全體矣何以見此法能成就也蓋所在之處常修佛行即自心是佛不從外得經在是則佛在是而弟子之所尊崇而敬重者亦在是宛然佛法僧三寶共居焉安得而不成就之也證六祖曰摩訶般若波羅蜜最尊最上最第一如法受持分第十三爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛說般若波羅蜜即非般若波羅蜜論此分大意全在人受持上然受此法易持此法難所以首段未說着受先講一箇持字後言細而微塵大而世界妙而佛之色身皆為虗妄但有名而已至於捨命布施俱是不實惟我此經乃真空本性獲福無量也講須菩提聞前所說成就最上之法深有歆慕但未知受持之道何如故白佛云此經當以何義命名我等當以何道奉持佛答是經名金剛般若波羅蜜乃無上菩提妙心無相無住直至諸佛彼岸此為最上希有之法汝當奉行而持守也其故惟何然我所說般若波羅蜜即非徒取其名正以妙明本性湛若太虗體既尚無何名之有如來恐人生斷滅見不得已而強名金剛般若波羅蜜也證三昧經曰心無心相不取虗空不依佛地不住智慧是般若波羅蜜真妙理也傅大士曰恐人生斷見權且立虗名須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說講般若之法心法也如人飲水冷煖自知何所形其擬議若有所說即謗佛也故佛問有所說法否須菩提答云如來無所說自性自悟直下何容開口處所以無得無說矣證世尊臨入涅槃文殊請佛再轉法輪世尊咄云吾住世四十九年未嘗說着一字汝請再轉法輪是吾曾轉法輪耶又佛偈曰始從成道後終至䟦提河於是二間中未嘗說一字須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界論世界微塵即依報也傅大士頌云積塵成世界析界作微塵言此者正見纖毫塵垢世間境界皆幻妄不實佛與眾生同處此塵世中但心有迷悟不同佛之心清淨心也即成清淨世界眾生之心污濁心也即成污濁世界在人之自修何如耳講佛告須菩提云三千大千世界所有微細塵埃果為名否須菩提以為世界固多而微塵不勝其多佛又呼而告之如來說諸微塵者原是幻妄之物雖有色聲香味觸法之多紛紛亂起而虗靈之府太空澄徹豈有纖毫塵垢之所點污故言不是微塵乃假名為微塵也如來所說世界者葢山河大地明暗色空原不是我心中本有的只因妄想安立故也人於世界中識得不是世界則心地廓然淨無瑕穢便是出世間法非世界之所能囿是名為世界也證圓覺經云幻心滅故幻塵亦滅世尊答文殊曰在世離世在塵離塵是為究竟法正此意也須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相註三十二相如眼耳鼻舌等類此乃色聲佛也凡所有相皆是虗妄者也講佛問須菩提可以此三十二相見如來不須菩提言如來之相雖勝妙殊絕不宜以形色求之何以故葢如來所說相者非真相也妙體如如湛然常寂乃諸佛本心者也是名三十二相須菩提若有善男子善女人以恒河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多論前借捨財以明勝此借捨身以辨多講佛又曰世間所重者莫過於身命若有人以恒河沙之多比此身命布施如摩頂放踵利天下為之其所獲之福視寶施之福尤有加焉但不明本性特頑福而已若以此經反四句偈等受持而講說之自利利他其獲福無量較彼捨身者不甚多乎此金剛般若波羅蜜法汝當受持可也離相寂如分第十四爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經註深解者心中大悟也義趣者義理旨趣也慧眼者聖人之心有七竅一聞千悟此智慧眼也講須菩提一聞佛言心中便悟理趣自傷得聞此經之晚乃涕淚悲泣而白佛言世間之少有我世尊也說此金剛經深奧典章雖我昔來有此慧眼善能聆悟者未曾得聞此之經之精奧昔所未聞而今聞之其且悲且喜當何如哉世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德論人能信實相者即是非相若有少相即非實相故以無相為實相如來說此而人能信豈非第一希有言生實相者此是無生生也信心清淨者信本來心無法可得不起妄念心常空寂湛然清淨也了悟萬法由此淨心建立是名實相經以福兼德者屢矣此獨變福言功謂功成果滿之時其福不足道也講須菩提言我既聞是經矣已悟自性清淨中本來有此真實相矣但恐悟之者之少也若再有人得聞是經一念發篤信之心其心純是天真毫無欲塵所累便得清淨般若慧光如露柱燈籠而真實不虗之相從此生矣即是我心之功德也當知是人成就諸佛第一希有功德莫能出乎其右矣證圓覺經云一切實相性清淨故六祖云從清淨體中流出般若波羅蜜多又云功德在法身中非在於福即此義世尊是實相者則是非相是故如來說名實相論則是非相者實相無相故言為非不是無實相如龜毛兔角只說龜無毛兔無角不是說無龜無兔正猶達磨所謂水中鹽味色裏膠青云耳世儒不思細細根究一味班駁佛是虗無寂滅妄矣講須菩提稱世尊而言我所謂實相者謂實理也般若實相如太虗空本然未有形迹若悟實相不可執着為實相此如來所名實相者也證傅大士云彼岸更求離趙州云佛之一字吾不忍聞此說得之世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有眾生得聞是經信解受持是人則為第一希有何以故此人無我相人相眾生相壽者相所以者何我相即是非相人相眾生相壽者相即是非相何以故離一切諸相則名諸佛註信解者心無所疑而了然悟也受持者心既領納而守之堅也講須菩提言我今得聞此經以我從來之慧眼自能信其言之實解其理之妙聽受而持守之言下承當不為難事若當來世年久之時有眾生聞是經者信解受持則此人明了自性真第一等人而不易得者也何故此人不多有也以其頓悟真空必無人我等四相所以然者因般若波羅蜜人我兩忘凡壽盡泯原無一法可得即非四相也若離一切諸相其心空寂即到覺地與諸佛齊驅並駕名為佛矣佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有怖音布註如是者所言當乎其理也驚者駭其言之過也怖者恐其道之高也畏者怯其行之難也此便是不能信解受持矣論佛恐世遠僅存言教設人有此三心則信解受持不能堅固故稱是人甚為希有講佛因須菩提之言而即印可之曰汝言深契佛理如是如是後果有人得聞般若妙法不驚而無疑心不怖而無懼心不畏而無退心則渙然氷釋怡然理順其人豈不希有哉何以故須菩提如來說第一波羅蜜非第一波羅蜜是名第一波羅蜜講佛說此人為希有者何也葢我所說第一波羅蜜乃真空無相自性自悟何曾有波羅蜜可名不過假是說以開悟羣迷而已是名第一波羅蜜也須菩提忍辱波羅蜜如來說非忍辱波羅蜜論人以強暴加我此真可耻其辱莫甚焉於此忍之何事不可做此忍人所不能忍波羅蜜有六種這一波羅蜜最難克化今人一言不合則怒氣相加起種種無明煩惱人我干戈四相未空障蔽真性佛所以獨揭此一件合人滅度講佛告須菩提云凡有辱境之來恬然處之不起嗔恨以亂我之般若則心同太虗即造到覺地此忍辱波羅蜜也俱真空本來無相外不見其可辱內不見其可忍渾然兩忘此如來說非忍辱波羅蜜矣證法華經六波羅蜜云檀波羅蜜尸波羅蜜羼提波羅蜜毗梨耶波羅蜜禪波羅蜜般若波羅蜜即布施持戒忍辱精進禪定智慧也又名六度何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無眾生相無壽者相何以故我於往昔節節支解時若有我相人相眾生相壽者相應生嗔恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無眾生相無壽者相解音皆上聲註昔者前生也梵語歌利王此云極惡之君五百世者即五百生也昔如來因地修行證初地菩薩時修忍辱行在山中宴坐因歌利王出遊獵王乃憩息睡醒不見左右彩女遂親入山尋見眾妃宮女圍繞禮拜仙人王乃大怒問曰云何恣情觀我女色仙人曰於諸女色實無貪着王曰云何見色不貪仙人曰持戒王曰何名持戒仙人曰忍辱即是持戒王乃將刀割仙人身問曰還可痛否仙人曰實不痛王即節節支解問曰還嗔恨否仙人曰我尚非有何有嗔恨天怒雨石王懼乃免爾時王者即憍陳如仙人者即釋迦如來也講此因忍辱說此以證之佛言我前生為歌利王割截身體時心如虗空不起四相何以故也當初節節支解可謂辱之極矣若有四相則嗔心定起恨不能忘何以言忍又再思念曾於過去五百世作忍辱仙人曾修忍辱之行所以於往世亦無有四相之累歷劫頓悟真空此我所修誠非一朝一夕之故也以是知忍辱波羅蜜學道者之先務首要破其嗔心方離四相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住註佛言心有四相則非清淨豈我無上菩提之真性不免住着六塵非菩薩也我前所言離一切相即名諸佛又言應無所住而生其心此正般若波羅蜜為無餘涅槃者也講呼須菩提言菩薩欲成佛道當空其心離去一切形迹方可發此無上菩提道心又不當住着於色而萌可好之端不當住着於聲香味觸法而起一可欲之念當於無所住者而生其心則此心圓通無礙真純無欲非一切相之所繫縛若心於六塵上有一住着便落他窠臼不能脫灑則所住不是菩薩住處也證六祖云我此法門以無為為本是故佛說菩薩心不應住色布施須菩提菩薩為利益一切眾生應如是布施註布施之義非捨施於人也何以言之葢此經乃談真空本性頓教法門字字當精切語俱在心上用功非教人外面做因果事深造者當自得之眾生非胎卵濕化之類吾心中之眾生也利益者不為色聲香味觸法所染六根清淨豈不是利益一卷中翻復說來俱管在受持演說二意我能受持讀誦則為布施之體為人演說則為布施之用黃蘗心要云過去心不可得是過去捨現在心不可得是現在捨未來心不可得是未來捨斯言盡之矣六塵中惟色最易染人所以說色而不及聲香味觸法者意在中也住者黃蘗棲泊兩字最下得妙紫陽夫子曰人心活物須要棲之澹泊然後為得真確論也講佛自謂我說菩薩心者本虗而明若住色而為運用此心不為覺矣所以不住色布施也菩薩以此不住覺心利益我一切眾生妄心使眾塵不隔真智現前當以此廣布而設施之可也如來說一切諸相即是非相又說一切眾生即非眾生講佛言如來所說一切諸相者乃是外幻於我真性中本來何有故非相也又說一切眾生者以心有四相名為眾生若能約己迴光妄心自離即無眾生可得故非眾生也須菩提如來是真語者實語者如語者不誑語者不異語者講佛恐人聞此經之言便生驚怖畏懼不能成就乃開導之曰我如來所說般若波羅蜜法皆無上菩提了悟本性真焉而不妄實焉而不虗默契真常之理如如而不變易其詞所言者非欺誑之言所論者非異常之論不過欲人自性自悟豈謬哉須菩提如來所得法此法無實無虗講佛言如來所以得此般若法者葢緣滅度眾生以悟真性只一個空無所空之心法也將以此法為實耶真體空寂本無實也以此法為虗耶妙用無方亦無虗也無實與無虗合則此法之體用備矣真空之妙非以是哉證中庸曰君子之道費而隱正謂此也須菩提若菩薩心住於法而行布施如人入闇則無所見若菩薩心不住法而行布施如人有目日光明照見種種色闇同暗註菩薩者學道之通稱也心住法者謂之法塵也講佛言凡此修行菩薩當悟真空不宜有所住着以為運用也設或心着此法而行其布施則四相未除為無明暗障如人入於暗室之中昏焉而一無所見矣若菩薩心與法俱泯無所執泥而布施於外此則豁金剛眼然般若燈圓悟如來洞達無礙乃無上之知見也者如人本有眼目又得杲日當空了一切境見種種色矣須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德講此經具自性中莫大之功用德行實為希有也若如來滅後或有善男善女能於此經受持讀誦直下頓悟則不事口耳之末而了此真空之妙即到菩提覺位為自性如來佛以智慧清淨之目盡知盡見此人皆得成就無量無邊見性之功德周法界而無方歷萬劫而常在豈有眼量之所哉持經功德分第十五須菩提若有善男子善女人初日分以恒河沙等身布施中日分復以恒河沙等身布施後日分亦以恒河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說分去聲註初日分謂早晨中日分謂日午後日分謂晚間論佛所謂捨身布施要知即是儒家損己益人後世體認一差醜怪百出或破肉燃燈或刺血書經或露頂焚香其弊一至斯極吁佛之心愈無以自白於天下斯人也其佛之罪人歟書此以戒流俗講佛言設有善男善女於一日之間以恒河沙等身命三度捨身至於無量數劫則無量福量曷可勝言然止能受世間頑福耳若有人聞此經即信於心不違逆其說其受用之福尚勝彼捨身之福何況自書寫其章句而尋繹其言受持讀誦而解悟其理又以是經與人解說其義則不徒自明己性且教人各各見性善根純熟利益無窮其福又焉有限量哉須菩提以要言之是經有不可思議不可稱量無邊功德稱量俱平聲古稱秤通用講佛言若能明此法門即見性成佛以簡要言之則此般若真經有不可以凡心測度亦不可以淺言擬議又不可如器物平秤而度量之也則此功德之無邊際雖讚歎所不及矣證六祖曰不離自性是功應用無染是德功德在法身中如來為發大乘者說為發最上乘者說註六祖曰法無三乘人心自有等差見聞轉誦是小乘悟法解義是中乘依法修行是大乘萬法盡通為行俱備一切不染離諸法相一無所得名最上乘乘是行義不在口爭是也講佛言此經如何有此無邊功德葢金剛般若吾之妙用本性必大乘菩薩最上乘如來所印證者也豈小乘人所能堪任故如來為啟發大乘人而闡此真空之妙亦為啟發最上乘人而演此般若之法也若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提註背負為荷在肩為擔言無上菩提至重難任一旦道由人弘毅然以身承仕所以成就大功德也講佛言此般若經既為大乘最上乘人而說乃無上正等正覺之妙道也有人受持讀誦既以成己廣為人說又以成人人己兼成功用德行無有盡藏如來於此一一知得此人見得此人可以成就之也此人既能成就功德即能以身挺然任此大道將如來阿耨菩提之法一擔負而荷之無遺理矣自覺覺他覺行圓滿功德寧有涯哉何以故須菩提若樂小法者著我見人見眾生見壽者見則於此經不能聽受讀誦為人解說樂音要註樂者喜好也小法者鈍根之人志意下劣如佛說法華經五千人退席是也不曰相而曰見者心染此四相墮於邪見也講佛云人或樂小乘法者局於見聞之小不免有我人等見之私於此大乘最上乘法便起驚怖畏懼之心其於真性懵然不知故不能聽受讀誦為人解說也須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍遶以諸華香而散其處華古花字講此心中般若無相真經乃自性佛永為萬世不刊之大典若在在處處有此持經之人則功德素著如摩尼寶珠瑞光炳耀一切世間天人阿修羅為之供養當知此處便是如來真身舍利寶塔誰肯生一慢心必作禮而五體之投地圍繞而大眾之皈依以諸寶花妙香布散於持經之處則供養可謂至矣此正謂一人辦心諸天辦供也能淨業障分第十六復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提註世者三十年為一世也惡道猶惡境也小而憂辱大而死亡皆是也六祖云約理而言先世即是前念妄心今世即是後念覺心以後念覺心輕賤前念妄心妄不能住故云先世罪業即為消滅妄念既滅罪業不成即得菩提論圭峯科此經為轉罪成佛梁昭明太子科判此經為淨業障若是依經解義便涉到報應因果中去了不知般若真性乃最上一乘必不是此等說六祖以先世今世作前念後念真確論也不可把先世後世認作前生今生講佛言世有男子女人既能受持讀誦此經真可敬重也而反為人所輕真可尊貴也而反為人所賤其故何哉葢此人必是已前年分未曾得聞此經之時着於四相住於六塵所有罪過業緣當墮落於惡境下流之污以今世人所以輕賤之而不供養恭敬故也今既持經而真性圓明是本來無一物何處有塵埃已前之罪業即消滅矣當得無上菩提之正果也須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及那平聲他音陀分去聲註梵語阿僧祇此云無央數梵語那由他此云一萬萬劫者世也佛心有六通無始以來事慧眼皆知之謂之宿命通也末世徒知事佛而不知佛究竟處盡在此經故以此言較其功德之多寡也講佛言我於無量無央數劫在然燈佛已前得遇八百萬億那由他諸佛出世盡皆供奉而不敢怠承順而不敢違無有空過一處而不供承之者是我歷事諸佛之多如此後有末世持經之人見自本性永離輪迴以是功德較量我供佛之功德雖百分百千萬億分乃至算數之多譬喻之廣皆不及持經功德之一分也須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議註具者盡也狐是獸名野犴其性多疑果者功有所成報者理有所騐非今生後世果報之說講佛再呼須菩提而曉之若男子女人於後末法之時受持其理讀誦其言得此無量功德必無疑矣我若再盡言其詳或有鈍根之人聞之起驚怖畏懼之心狂焉而無定持亂焉而無定見展轉如狐之疑惑不能信受葢不知此經之妙故也當知此經之義理乃真空無相最上一乘不可以心思言議探其底蘊也至於究竟一受持讀誦之間先世之罪業消滅無量之功德難及得此果實報驗者又豈可以思議之哉真極盛而無以知也究竟無我分第十七爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切眾生滅度一切眾生已而無有一眾生實滅度者講須菩提復問佛云菩提心何所止眾生心何所伏佛曰菩提心者本來具足當體現成只因眾生蔽於塵染而戕賊者總總也人當先要培養此真心然欲盡者理方還我當以此一切眾生心如煩惱妄想取捨人我貪嗔嫉妬種種四相之類一一除滅而度脫之既滅度眾生已了則般若觀照常住不滅凡前所有一切妄心原非真性中所有如紅爐點雪消融殆盡無一眾生實滅度也何以故須菩提若菩薩有我相人相眾生相壽者相則非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者註此節實無有法四字當重佛恐人錯認當生如是心者為真實故又說破謂究其實乃我真性中原無此也講佛云此何以故也若學道之菩薩四相未除則菩提心無由而發何以言菩薩所以然者以性本空寂渾然天成其發此心不過自悟自修實無有法發此阿耨多羅三藐三菩提者也須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提講佛呼須菩提反問云我始於本師然燈佛處有法可得名之為無上正等正覺否須菩提言我曉佛所言之理佛於本師處乃是自性自悟無有傳受秘密之典而得菩提之道也佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義註梵語釋迦此云能仁即度脫一切也梵語牟尼此云寂默即心體如如也牟尼為體即是如字能仁為用即是來字先言釋迦後言牟尼者攝用以歸體也如來者從體以起用也總是真性詳言之則為阿耨多羅三藐三菩提略言之則為如來又略言之則為佛諸法如義者葢我真實之性本來自如其見之於諸法事者亦自然而然來為應迹去無留滯如如不動的義理也即上無為法也講佛深以須菩提之言為當故稱如是如是復謂之曰實無有法得此菩提若曰有法然燈佛即諄諄然舉其佛之所得者傳之於我即不當與我止授一記云爾來世方得作佛號釋迦牟尼也葢本原不從外得徧虗空世界而常自如所謂一法不立一塵不染也然燈不過授記而已何曾得法於他皆是我如來本性也何以故如來者不離諸法即一切法中自如的義理也證維摩經云如者不二不異一切法亦如也眾聖賢亦於也至於彌勒亦如也若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗講佛又恐人未悟復曰或有人說我得此菩提之法不知我從實無有法上得之然我所以得此法者皆是我之清淨心中菩提覺性本無形迹此法無有實色相空處即是菩提此法無有虗正謂色即是空空即是色故知如來所證菩提之法不空不有也是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法講佛說諸法皆發明真常之精奧用為修行之徑路非外道可比皆是般若之佛法也然人心之大事未明須賴此法指示迷途除去四相若真空既悟我自得之法亦非有方名佛法也佛所以隨說而又掃去者蓋謂不可泥於法耳豈真絕無法哉須菩提譬如人身長大須菩提言世尊如來說人身長大即為非大身是名大身講此段設譬以起下文佛問須菩提譬如人之一身雖長且大果真為大須菩提答云如來說人身長大者心不菩提徒為委形則非真實大身是虗名為大身而已須菩提菩薩亦如是若作是言我當滅度無量眾生則不名菩薩何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無眾生無壽者講佛告須菩提曰菩薩之所名覺眾生者亦如大身之不為真實也夫我真性中廓然常虗本無眾生因為四相未離則眾生從業緣中而現反之太初了無可得若菩薩自言我當滅度無量眾生正所謂驅除妄想重增病也何以名為菩薩夫修行得至於菩薩者誠賴佛所說之法以滅度乎眾生但真性中自有無上菩提之妙本無眾生可度又何有法可據此所以名菩薩也是故佛所說一切法者不過隨時順宜與人解粘去縛而已豈有能所心哉所以無我人眾生壽者之妄心矣此四者統而言之皆謂之眾生眾生本無何滅度之有證維摩經云法無眾生離眾生垢故法無有我離我垢故法無壽命離生死故法無有人前後際斷故此真空無相法也須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴講佛言若菩薩自說謂我能莊飾嚴整其佛之剎土是着於有相豈足為菩薩所以者何我所說莊嚴佛土者非為粉飾外貌之具乃吾心佛土也佛土無相本來清淨云何可莊嚴哉如來以非莊嚴為莊嚴有妙莊嚴存焉是則所以名莊嚴也證陳雄曰以定慧之寶莊嚴心佛土者菩薩也不言其功而人莫見其迹以金珠之寶莊嚴世間佛土者凡夫也自言其功而常急於人知文殊般若經云為一切眾生發大莊嚴而心不見莊嚴之相淨土論云備諸珍寶性具足妙莊嚴須菩提若菩薩通達無我法者如來說名真是菩薩註通達者見得十分透徹也無我者即吾儒之無以有己也法者理也真菩薩者造到純然無偽即等覺也講佛言由前所說阿耨菩提究竟將來總是個無我之法夫法界原無盡藏有一我心便着於人眾生壽者未了真空必定執其有法有滅度有莊嚴所以不名菩薩也茲則直下大悟如漆桶底脫四通八達廓然無我我身既無何更有法人法兩空此如來言說而稱名之曰真實的菩薩也一體同觀分第十八須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼註肉眼一觀天眼徧觀慧眼證法法眼擇法佛眼度生凡夫與如來俱同此眼異處在覺不覺耳論世法上論指五眼為佛眼睛之眼以理論則心竅之眼也眼通於心大凡眾生皆具此五眼與佛無二因四相六塵遮蔽只有肉團眼一件而已儒書云聖人之心有七竅即是五眼之謂也佛有五眼乃常住真心非過去未來現在之妄心也講佛欲闡世間眾生之心有若干種先設此五眼沙界二喻之問云如來有此化身觀見之肉眼普照大千之天眼般若常明之慧眼了諸法空之法眼自性常覺之佛眼有此五眼否乎須菩提皆據理答之曰如來有此五眼矣證昔雲巖問道吾大悲菩薩用許多手眼作麼吾云通身是手眼是言極妙苟無眾生無四相一瞬不具而況多眼乎要人自見耳須菩提於意云何如恒河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如一恒河中所有沙有如是沙等恒河是諸恒河所有沙數佛世界如是寧為多不甚多世尊註沙等恒河者謂一粒沙為一恒河廣譬設喻言恒河之多也以沙等恒河之沙數佛世界又不勝其多矣假設此問而言之也佛世界者三千大千內必有一佛設化謂之曰佛世界講佛欲人明此許多眾生妄心故以許多世界為問云舉此無窮之沙以數佛之世界果多否乎須菩提亦以甚多答之佛告須菩提爾所國土中所有眾生若干種心如來悉知何以故如來說諸心皆為非心是名為心註若如也干數也心數雖多不出過去未來現在環轉鈎連糾結不了無非妄心諸心即若干種心講佛告須菩提云不必遠論恒沙世界即如爾之國土中所有許多眾生各具一心則其心有若干種如來以清淨五眼皆盡見知之其故維何如來所說一切心皆是眾生妄心非性中常住真心識得妄心非心菩提本體現矣是名為心也所以者何須菩提過去心不可得現在心不可得未來心不可得註思念前事者為過去心思念今事者為現在心思念後事者為未來心不可得言本來無有也論此三句我佛談到骨髓處何必歷覽群藏向外馳求哉所以佛恩難報也凡人一念中即有未來現在過去須看得活故疏鈔云若一念有起滅即成六十種邪見九百種煩惱是也講佛言如來所說非心者何也葢常住真心妙湛圓寂體用如一若太虗空離諸緣引之想過去心已滅何所凝滯於物現在心不住何所專主於有未來心未至何所預期於先虗靈莫測反觀於內三心總不可得也此方是菩提真心一體同觀矣證論語云子絕四毋意毋必毋固毋我六祖云前念後念及今念三念不被邪見染張無盡云一念不生全體現古云三際俱斷三念皆妄了不可得法界通化分第十九須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多論三千大千布施之福俗眼為實佛眼為無布施既廣得福自多所謂以是因緣也畢竟是有礙有着不是清淨福德以無為福纔是不住相布施故不徒言得而言多也講佛又反復申之見吾心中法界所通化無窮者雖寶施不足以擬之也故問須菩提若有人以滿三千大千世界之七寶用為布施其福德果多否須菩提亦以甚多答之佛又呼須菩提言曰若福德之有真實則徒求之於外取諸相也有相以為布施其報有限如來不說得福德多我之所謂福德者離諸相也即前無住相布施在如來無能施之心在法界無可施之迹正是無為清淨功德其福等如虗空豈有漏之因所可同日語此如來說福德多也離色離相分第二十須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身註具足者無少虧欠也論此段專主離色言此分與第五分第十三分意俱同而佛乃重言之者葢末世修行多執色相如香花頂禮外貌供奉不悟自己真性佛所以反復叮嚀告戒之也講佛恐須菩提錯認如來色身把作如來真身看了故設此疑而問之曰佛可以具足色身見否須菩提即解其意遂答之曰不也世尊如來不應以具足色身見何以見之葢色身乃血肉之軀非法身也若法身則縱橫無礙自在自由念念無非般若豈八十種好所能囿也色身中有妙色身存焉方名具足色身矣證華嚴經云清淨妙色身神力故顯現須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足論此段專主離相言講佛又問之曰如來可以具足諸相見否須菩提即解其義而以否答之葢自受生以來有形者有形形者有生者有生生者若無真性法身則雖有相亦天地之委形也此如來不應以具足諸相見矣所以者何如來所說諸相具足非徒取諸相也以如來雖有三十二相必具足乎三十二行般若觀照萬象悉融凡六神通八解脫具於自性中者皆無欠無餘常滿足爾此肉身如來內有真如來在焉是名諸相具足也非說所說分第二十一須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法則為謗佛不能解我所說故須菩提說法者無法可說是名說法論此分與第七分無有定法如來可說十三分如來無所說意大同亦不過反復告人勿執文字之陳言而寡默識之妙道也謂之曰勿謂又曰莫作我佛叮嚀之意至深切矣講佛告須菩提曰爾切勿自謂我如來有心作此念頭有此說法以開示於人汝切莫作是念何以故設或有人言佛有法說於人則是淺見寡識滯在文字之粗是為謗佛不能解會我所說之義故也又呼須菩提曰我之所謂說法者不假口說之騰默契心源之妙唯能坐斷十方打成一片非言語可到本來無法可說是名真說法也證圓覺經云依幻說覺亦名為幻既名為幻所說之法亦皆是幻張無盡云非法無以談空非人無以說法妙明子云智高遠水孤峯性寂寒潭皎月然後可以盡離不離言之道也如如居士云終日喫飯不曾咬着一粒米終日著衣不曾掛着一莖絲所以我佛橫說直說四十九年未嘗道着一字爾時慧命須菩提白佛言世尊頗有眾生於未來世聞說是法生信心不佛言須菩提彼非眾生非不眾生何以故須菩提眾生眾生者如來說非眾生是名眾生註慧言德命言壽即長老之別名講須菩提問佛曰末法之後略有眾生聞說此經般若之法能生敬信之心否也佛呼須菩提曰汝勿謂五濁惡世之間俱是不信佛法的人葢佛與眾生原非兩類同具此般若真心彼雖為眾生而真性原有非可以眾生目之彼雖非眾生而業緣現在又非可以不眾生目之何以故也眾生於眾生之中苟能聞般若法而敬信之言下見性是即前之所說非眾生中人也是假名眾生爾無法可得分第二十二須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提講須菩提以解空之性深悟菩提之奧乃以無所得為問佛深許其言之當也言如是如是我於無上正等正覺之法不從外得乃吾之真性也真性中蕩然虗空神凝智泯情卷思澄迎之無首隨之無後不可以色相取不可以言說求無有少法可得也不過強名曰阿耨菩提而已證玉樞經云道在天地天地不知有情無情唯一無二六祖云妙性本空無有一法可得顏柄曰有法可得是名法縛無法可得方名解脫淨心行善分第二十三復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無眾生無壽者註阿耨菩提法者即真性也刊定云在聖不增故無高居凡不減故無下此言平等性也真心即是性原無兩樣講佛又再告須菩提云我所說阿耨菩提之法乃吾本然之性居聖位而不加處凡流而無損人人具足世世同然蕩然太虗較若畫一是色身則有高下真性則無高下所以名為無上正等正覺也何以見之以我真性中原無有我人眾生壽者之妄若有此妄則嗜欲深者天機必淺攻取累者湛一不全吾見塵勞種種異起何得為平等法哉法為平等方名無上菩提矣修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法論夫平等之法不從外得矣一向認着本來現成墮諸無事甲中不假修進此又愚迷不返者也講佛又說當修此一切善法凡布施持戒忍辱精進禪定智慧皆是明心見性之善法依此法修則虗己冥真崇德履道造至覺地矣即得此阿耨菩提也然又恐人泥於有法又呼須菩提曰我所言善法者乃接引眾生入道之門本來原無此善法不過假此虗名以開悟人爾若執着善法便有人我等相矣又落兩頭機豈是平等哉論傅大士頌云水陸同真際飛行體一如法中何彼此理上豈親疎自他分別遣高下執情除了斯平等性咸共入無餘福智無比分第二十四須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及論此義雖重各有妙旨詳見讀法講佛告須菩提云須彌為眾山之王三千大千中諸須彌山又不特一須彌也設或以七寶之聚等如許山之多用此布施福德固為多矣然自性若迷福何可救若人以此般若經併四句偈受持有得於心演說有益於世則不徒見佛了生死亦且如佛度一切是修自性上福德是聚自身中七寶比前七寶布施之福德不及此經百千萬億分之一也人可徒以布施求之外而不求之心哉化無所化分第二十五須菩提於意云何汝等勿謂如來作是念我當度眾生須菩提莫作是念何以故實無有眾生如來度者若有眾生如來度者如來則有我人眾生壽者論非說所說分中汝勿謂如來作是念我當有所說法如來說非眾生是名眾生此分中云汝等勿謂如來作是念我當度眾生如來說即非凡夫是名凡夫佛恐人泥着有法可說可度而不悟自性自度故又告戒一番講佛呼須菩提曰汝之意何如凡汝學道之人勿謂我如來實有此意而必有化度眾生之心汝等莫作此念可也所以然者如何佛雖有此般若波羅蜜法以開示眾生然眾生之心本來空寂般若智慧原自具足苟有聞經悟道乃眾生自然化度我何度之有哉所謂平等真法界佛不度眾生也若說一切眾生必是如來化度則如來即同凡夫便有我人等之私矣須菩提如來說有我者即非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫講夫人有一我心斯有人有眾生有壽者己私未克故也如曰有眾生可度是如來執有我也佛又呼須菩提曰如來說有我者即非有我心也在如來以是法潛孚默化於人而不見其迹在凡夫假是法頓悟自修於己而莫測其自何嘗區區作此念曰我當度眾生而執為有我哉至於凡夫未能見性所以我相未忘而非以此論佛也佛又恐人分別凡夫復呼須菩提曰凡夫如來說即非凡夫葢真空無相之道自二五凝成之初原無虧欠悟則剎那即入覺地矣豈可以凡夫目之乎所以如來凡夫本同一性不容區別也法身非相分第二十六須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來註觀與見不同見視也觀諦視也見屬目觀兼心目所謂想見也論如法受持分中佛有三十二相之問須菩提曾以不也答之此又以着相答佛者非前悟後迷也因世之着相求佛者往往皆然不反其意以答世尊安得世尊盡出肺腑示之哉善現加慧人至矣講佛告須菩提曰汝之意果以三十二相觀如來否須菩提若未喻其意反答曰如是如是欲觀如來者不出此三十二相也佛即聽之曰設若如來可以三十二相見則轉輪聖王乃管四天下如輪之轉以其福業之多故其色身具足三十二相與佛相似是轉輪聖王亦當為佛矣須菩提隨應聲曰以我解佛之義不應以三十二相觀如來也爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來註偈者發言成句也色者如莊嚴佛像之類見者親覩之也聲者如歌揚梵讚之類求者索也我者佛自謂也邪道者聲色乃是幻妄惟真性方為正覺也如來者真性法身佛也講彼時世尊而說偈曰法身等如虗空靈覺含真妙體湛寂離彼形迹之間超諸耳目之外爾等若徒以顏色覩其形容或徒執聲教聽其謦欬欲以此二者求見我之真性此等之人泥於色身佛皆捨正路而不由所行者邪道也決不能見佛本來面目矣欲親見如來常住之真性當求之於精神心術之中豈可以聲音笑貌為哉證儒書云視於無形聽於無聲太上護命經云視不見我聽不得聞離種種邊名為妙道無斷無滅分第二十七須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相論此分二段初則反其辭而詰之次則正其辭而曉之因此經中俱說無恐人執着此無沉空棄有反成斷滅相矣夫斷滅則無相也亦曰相者何哉葢相者謂之形迹如晝明則為明相夜暗則為暗相以一切法皆斷滅不用則心何由以明性何由以見譬如過河無筏豈能得濟一向滯於頑空之迹將以何者為修行此所以為斷滅相也講佛呼須菩提曰汝若作此念頭說如來不用具足之相得此無上菩提汝切莫以此念而言云稱如來原無聲色可求非三十二相不假清淨妙行圓滿功德遽然得此菩提大道也又呼之曰如來菩提之心脫塵緣以備三常起圓通而滿十度其神無方其化無體原非斷滅者也汝若作此念言於一切法皆斷滅之大非矣何以言之發菩提心者必依般若之法以為修行之具若不用此法則心花何由發明而真如亦幾乎熄矣故於此不說斷滅相也證永嘉歌云棄有着空病亦然還如避溺而投火川禪師云剪不齊兮理還亂拽起頭來割不斷不受不貪分第二十八須菩提若菩薩以滿恒河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德註我者私己心也成者成就也論前章於六波羅蜜中揭出忍辱波羅蜜為言可見忍之義大矣哉人於一切萬事執着一個我心就有四相於六塵上見其可愛而受之見其可欲而貪之便不能忍耐以降伏其心而於菩提遠矣講故佛呼須菩提曰設或有菩薩滿河沙世界之七寶用為布施福固勝矣然未免有貪愛之心非自性功德也若復有人深知一切萬法從我自心而生湛若太虗不住不着無有我心得成就此容忍功德此等菩薩勝前菩薩寶施之功德矣何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德講佛先言無我方便成就此容忍功德者以菩薩原無所得心也佛恐須菩提錯認世間福德故又呼而告之曰菩薩以此忍道勝寶施之福者葢彼以有相之施必為有漏之因必不以此寶施而受用此福德也須菩提未解其義問云何菩薩不受福德佛又言菩薩所作福德俱是阿耨菩提之理或受持於己或演說於人無有我相無能所心何嘗念念貪着今日利葢幾事明日濟度幾人而欲受享此因果也所以說菩薩不受福德矣威儀寂靜分第二十九須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來講佛見世人多以四威儀中求色身有相佛而不知般若真性佛乃呼須菩提曰若有人說如來者或來而感應或去而入寂或坐而趺跏或臥而偃息以此四威儀遂指名曰如來則皆着於有相徒覩其形容未窺其精蘊此人不解曉我所說之義理也何故不解葢我所謂如來者謂真性佛也真性佛無相本不生滅其來也徧虗空盡法界無一物不闡遮那之形無一事不播如來之號要之諸法空寂本來無有何所從而來也其去也等觀自在妙入無為照五蘊之皆空見六塵之非有要之萬象全彰一真常住無所從而去也如而不去來而不來故名如來亦強名耳真性不可以形容也證華嚴經云上覺無來處去亦無所從清淨妙色身神力故顯現圓覺經云雲駛月運舟行岸移葢月未嘗運岸未嘗移真如體性未嘗作止任滅皆人謬見耳長水法師云水清月見月亦不來水濁月隱亦非月去但是水有清濁非謂月有升沉法中亦耳心淨見佛非是佛來心垢不見亦非佛去以人心自有垢淨佛本無去來也一合理相分第三十須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵眾寧為多不須菩提言甚多世尊何以故若是微塵眾實有者佛則不說是微塵眾所以者何佛說微塵眾即非微塵眾是名微塵眾論微塵世界皆是假立色相原不真實微塵在太虗之中游氣飄揚任其起滅世界在太虗之中明暗色空山河大地任其聚散若真性般若窮劫不壞豈二者所比哉講佛告須菩提曰如有男女等人以三千大千世界碎分為微細塵埃汝意以為多否須菩提答曰甚多何以見之此微塵眾等是人心妄想安立若曰真個有此微塵眾多佛則不說是微塵眾也唯此妄塵皆是外來之物非吾心上之所本有者若能心鏡常明微塵雖多豈足以障蔽我哉此非微塵眾是名微塵眾也世尊如來所說三千大千世界即非世界是名世界何以故若世界實有者則是一合相如來說一合相即非一合相是名一合相講須菩提又呼世尊而言如來所說三千大千世界皆由妄塵積聚而成劫數盡時亦有變壞此所以虗幻不實即非世界是名世界也何以謂之非世界若以世界為實有者必是本來真性自無始以來常住不滅以此真實之性在於世界中打成一片有而不滯於迹無而不淪於虗即是一合相然如來所說一合相者原以真性等於虗空豈假言說所能形容哉即非一合相乃強名一合相矣須菩提一合相者則是不可說但凡夫之人貪着其事講佛見須菩提已悟其實故再呼而告之曰是一合相之道空而不空妙不容言即是不可以言說求也但庸常之人不知真性為實貪戀執着於世間一切事認微塵為實有而妄緣超起觀世界為實有而幻境愈增擊縛於生滅者不少也豈知理相合一之為妙哉知見不生分第三十一須菩提若人言佛說我見人見眾生見壽者見須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見眾生見壽者見即非我見人見眾生見壽者見是名我見人見眾生見壽者見論人無知見即同頑石佛豈無之但知見有真有妄如法華經云開佛知見示佛知見悟佛知見入佛知見此知見之真也楞嚴經云知見立知即無明本此知見之妄也黃蘗云前說四相此說四見相粗而見精又云佛以見性為見人以見相為見講佛恐人着於妄見不能見性故發此問曰若人言佛說我人等四見汝意何如此人能會得義理否須菩提答曰佛之所說是人多不會其理何以見之世尊所說我人等四見滯於形迹之私流為物化之累所見皆虗妄也若真性中般若之妙如大明當空洞達無礙即非我人眾生壽者之妄見但虗名為我人眾生壽者見耳豈真有此見哉須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相註如是知如是見者即無上菩提之真知真見也法者事也相者形迹也不生法相者於事之有形迹如我人眾生壽者之見皆不萌於心也講佛呼須菩提曰若能興起無上正等正覺之真心者於一切事不起四見識自本心見自本性當有如是真知有如是真見又有如是信受解悟則阿耨菩提渾然具吾天真內凡在外有形迹底事能障吾之真心者皆不生於其心矣然我之所言法相者葢事雖在外順應而虗本不在我即非法相有形迹之可指也是假名為法相而已法相既非必無我人眾生壽者之見而菩提真心所當知見而信解者也發菩提心者曷審於此應化非真分第三十二須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼註無量阿僧祇世界者不止於恒沙也發菩薩心者謂發廣大濟度眾生之心即菩提心也講佛呼須菩提曰若有人滿無量無央數之世界七寶用施於人固為世間福矣若有男女發菩薩普濟之心於此經偈不徒受持自見其性又演說於人教人見性人己兼成此則出世間之福受用無有窮盡者也寧不勝乎彼哉證法常滿如來解云緣此經根本以破相為宗了空為義迷性布施皆不證真能識四句涅槃之門演說法身如如不動觀有為法同於夢幻若作此見教化眾生勝用七寶布施之福也云何為人演說不取於相如如不動論此不取於相兩句盡全經之要旨佛之精神命脉俱在於此當以心悟可也講佛自問云以此四句偈與人演說者何如而說之乃自答云不取於相如如不動葢我真性本無上菩提之妙心為無餘涅槃之實理人法雙泯情智俱忘自無形迹之可求亦無聲色之可見不着於我人眾生壽者也不住於色聲香味觸法也本來真空何有相之可取惟見如如焉自然而然一神通乎法界而定自真萬化妙於無方而體常寂雖滅度眾生而不有雖布施莊嚴而無心威儀寂靜而已知見不生而已徧虗空世界常住而未嘗動也此真四句而可以演說矣何以故一切有為法如夢幻泡影如露亦如電應作如是觀註夢出無心幻成有意夢覺入幻幻結疑夢皆從顛倒起也水漚為泡泡隨水消形照為影影從形滅皆虗無實也露以日晞電以霽散尤是倐忽起滅此六字中凡人事之感應山河之安立天地之變化都已說盡此四句剗盡經旨正如來真切滅度之處觀無所其空觀假觀中觀之妙智也講佛又曉之云我所謂如如不動者何以故也葢真空無相本自如如一切賢聖皆以無為法而親證之若世間有所作為之事皆虗妄不實如夢想之非真如幻術之假化如水泡之虗浮如身影之恍惚如朝露之易晞如閃電之易滅當作如是六者觀看可見世間之事諸行無常皆有生還有滅非真有也惟我如如不動之性湛若太虗超萬劫而常存與人演說其福德寧有盡哉佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說發大歡喜信受奉行比音彼講佛既反復大闡般若之法說經已畢首焉啟請之長老名須菩提者頓悟真空已領心印矣其時同會聽法者有比丘而名僧焉有比丘尼而名為師姑焉有居士而謂之優婆塞焉有道姑而謂之優婆夷焉一切世間之人及天上之天人并阿修羅之神聞佛所說此經各各言下見性不驚不怖不畏皆大歡喜幸正法之難遇悅今日之躬逢莫不信受其言而領之於心奉行其教而演之於人雖億萬劫來永證金剛不壞身也佛之慈悲至矣覩是經者其報佛恩哉證川禪師頌曰饑得食渴得漿病得瘥熱得涼貧人遇寶孾兒見娘飄舟到岸孤客還鄉旱逢甘澤國有忠良四夷拱手八表來降頭頭總是物物全彰古今凡聖地獄天堂東西南北不用思量剎塵沙界諸羣品盡入金剛大道場
