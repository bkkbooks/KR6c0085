front:
  text: 金剛經石注自序西天佛經甚多惟金剛經是如來微妙心法乃禪宗之至寶也予參悟多年因著金剛經石註一部愚註與眾不同每節分註論講證四段倣張居正四書直解例先逐字破義後以淺言直說意在闡明佛旨學者只須由此參悟自得正果而不錯矣略曰此經註解極多大半隔靴撓痒須要實悟真參纔得心明性朗我今直說根源不用狐思亂想但能至誠受持開卷瞭如指掌書內文載讀法十條闢妄十條以及總旨辨異極簡極明但此書每部計一百二十頁予發願印送一萬部奉送二年已足如願自愧力薄不能又送倘有善信隨意買紙予出印板聽刷分文不取共勷勝舉凡求如願功德不亞於河沙寶施也但願人人福壽長此邵子語也予於人情世事無論大小雅俗但有利益者俱以淺言刊書行世正續共取初集二三四集亦可聽便編定孝弟忠信字號但此書若能正續全得庶可盡悉善體略者自必心賞神怡福壽綿長矣賜教者可至揚州府西昇平街圈門內便是小齋金剛經石註自敘西天經典甚多惟金剛經是諸經之根經中所說悉成佛作祖之密旨自唐宋元明以來註此經者何止數百餘家各皆極意剖析總為指引迷途開悟後學功甚大而慧甚普矣諸家講註語義各有是否欲求其詳明折衷竟亦寥寥良由以語傳語大都紙上鑽研未從實地參悟而得又何怪其然耶殊不知此經乃如來心法眾生性源佛本無經經亦無說因一切有情淚於外誘昧其本靈顛倒昏迷輪迴苦海極可悲痛是以如來作此真空無相之說不過為眾生解粘釋縛還其本來面目何啻暗室明燈冥空杲日若能領悟立證菩提幸誠萬萬矣今窮鄉委巷但有善信之人皆知讀誦金剛尊經及叩其義理云何則懵然不解其謂雖有學者曾聽各師所講之論常覽諸家所著之書或屬言繁或成義雜徒令聞者見者是非可否茫然不知適從豈不以如來至妙之心法緣此而未即明傳深可浩歎哉愧予一介書生自知本靈半為外誘所淚然而身雖在家頗有出家之行每於儒書之暇最喜誦讀此經是以究心於此者已二十餘年凡講此經之堂無論遠近予必先到註此經之書不拘淺深予必悉觀雖聞見甚多奈異同不一自尚未的又何以曉示將來獨有儒士王化隆所註盡發如來精微又且脉絡貫通簡明確當不繁不雜功亦大矣惜註中間有與經文未透者亦有與經文相左者是猶玉中之瑕予不揣愚昧重加較正刪其偏背補其遺漏另自直解名之曰石註凡如來隻字片言悉由予一己之愚見參悟評定期歲書成因發願鏤傳印送萬部用廣如來之慈悲大啟眾生之智慧今而後得書諸善信緣經求法因法悟覺令真宗了徹密諦通明出生死途登菩提岸滅無量罪過獲最勝福田證果人天永臻快樂始信金剛經所說悉是佛祖最上之密旨而予之所言真實不虗也在予此註不過為人指引途路之方向令行者不致錯入崎嶇迂迴之境他日有幸或於如來會不結一指引之因緣已耳願諸善信早悟本靈同歸西天極樂上不負如來垂示之盛心下不負予一點指引之微念誠大快也康熈四十一年歲在壬午仲陽月之吉旦良覺居士石成金天基撰并書金剛經石註凡例十條此經流布於世傳本多誤陰冥之間惟以壽眷永慶寺南唐道顒法師石本為正今予此著悉照石本訂正凡有增減錯誤俱逐細更改一字無譌此經分三十二分相傳自梁昭明太子但天衣無縫割裂為繁且如推窮四果漸至如來政緊關昔在然燈何單承莊嚴佛土又色見聲求四句原與下文一氣瀠洄勢難以刀斷水然而品節有序讀者賴以記述今予此著止將各分標存細字於傍可以不必雜於經文讀此經他本前列開經啟請淨口諸文是皆後人所添亦可不讀今予此著悉刪此經世刻甚多大都付諸梓人予幼習宋字雖未精工略堪供寫今予此著一字一葉俱係親筆書寫較對明確始付刊刻讀者只照此本可信無誤此經世傳非高僧口授不可擅讀恐音韻舛誤致獲罪過予拜詢多僧音韻各有異同今予加考訂授是則從授非則改各將直音用小字註附每段之下讀者只依此音無誤此經古今註解極多今予此著每段類分註論講證四字葢將正文中字句逐一破解統以註字領之凡議論正文之源流或辨論他註之是非則以論字領之其講字所云悉體順如來須菩提口氣演發本文之妙義若證字所領則雜引古今成語或儒書或僧語或偈頌或詩歌惟取剖明本文之精微而已四類惟講字每段俱有其註論證三類若本文已明或講中已有則不重列自刻經註以來似未有如予之淺明分晰也間有幾註不從予之改定立正文者取其通俗也此經他註或另以正經先刊全本於前次復逐綱重註試看儒家四書朱註世有只讀正文者竟將有註之書讀之何嘗另周正文今予此著將經文高列一字讀者可以對讀不必另本亦不必梵本此經他本只用句點但孰是如來語孰是須菩提語在明眼自易分辨而初學未免混雜今予此著凡係如來語句用圈須菩提語句用黑圈阿難結集語用尖圈問答起語用連點點則語句分明瞭如指掌矣此經他註只用句點亦有圈者泛而不切今予此著凡係工夫密旨方用連圈若語句微妙止用連點餘悉按句黑圈其註中有尖圈者本文之字也此經今予所著言雖淺近悉皆演發如來心義予既分晰註解又復親筆書寫又復獨力刊印成書䖍誠敬送得書善信務要時置案頭成誦讀正文或領略註解或參悟旨趣或為人演說否則不妨轉送普利最不可束之高擱塵封更不可雜於小說曲本中非獨負予苦心亦且獲罪甚大金剛經辨異金剛經句字增減同異從無畫一如是名般若波羅蜜是名忍辱波羅蜜是名凡夫三句若非無想若字即非第一波羅蜜即字為利益一切眾生之下故字是第一離欲阿羅漢之下世尊二字等皆古本所無如是故名阿那含故字是微塵眾寧為多不之不須菩提言四字等皆古本所有如前文應云何住不同後文云何應住歷辨既詳雲棲伸公鎞刻尤加囑葢前問功夫下手後問無我是誰為之經意自別又見舊本因避高麗諱改即為則凡即通作則後見海虞嚴公諱微折中諸辨謂合兩之義為即相仞之義為則即可用之相仍則不可用之合兩歎譯者復作不易其言而即與則兩字之從違遂定大抵等閒應用則者但隨文義輕折庶全旨即非之即更得顯出玄微既定一卷持誦併佐同志參稽聊引申學問中慎思明辨之意若曉曉自詡辨真則吾豈敢金剛經闢妄一切佛經俱應作如是觀何必靜室世人誦經多覓靜室殊不知堅誠全在於心而不在於境也本心若靜雖居閙市叢中亦是深山僻地試看吾儒善讀書者蓬門圭竇掛角而讀帶經而鋤竟以成功何在書房之靜乎何必出家出家原為脫離此罣礙每見有等出家僧人貪戀之心仍在名雖出家實則與在家之人無異如此出家反不如在家而有出家之行者轉為上等試看古今在家善信得悟菩提者甚多如傅大士龐居士諸公俱有妻子塵累於道無礙可知全不在乎出家也何必清晨清晨誦經取其至誠要知心若至誠雖午晚十二時無一非誦經之時意到即持斯為得之何必啟請經中云在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍遶可見此經或是誦讀或是解說諸天神不召即至何須啟請即其開經文淨口等呪讀之不多不讀不少何必設像對佛像意在起人敬畏殊不知經中云凡所有相皆是虗妄若見諸相非相即見如來又云莊嚴佛土者即非莊嚴是名莊嚴乃知莊嚴以及佛相俱在心之誠否心若不誠雖時刻與聖像不離亦何益矣何必敲魚木魚鐘磬取其音韻節奏無亦不礙於道何必急誦誦經至在口讀其文心思其義只要字句明朗微旨了徹雖低默讀誦俱為上乘若是急急趕讀含糊圖快未免到口不到心縱然讀過萬遍經義不解原與不讀者相同又有高聲朗誦者徒損其氣亦甚無益何必跪諷參悟經義不拘行住坐臥無有不可何必專在於何必梵本佛法原不繫於文字即此金剛般若名字亦是強立何況拘其經之書本梵本耶不論囊內之金珠瓦礫只論外包之錦繡布帛吾甚惑之何必全部吾輩在家俗人難免塵勞緊冗非同出家閒人可比假若正在誦經之際忽有緊急事務必俟此經誦完豈不遲悞果有緊事但須記著經中分數就此止住俟事畢再來補完未為不可至於此經註解非細加參詳則妙義不明若人事勿忙之際何能全讀須知塵事稍閒隨便看一段可得一段之益解一分即有一分之功試看六祖當日只聞經中應無所住而生其心一句即證菩提可見惟在學人心悟如何豈計其語句多寡耶金剛經總論夫人自二五凝成以來賦此虗靈不昧之良莫不各有一卷真經及其知誘物化之後本真旋失名雖為人實無以異於禽獸抱朴子有言人生覆幬間自幼而趨壯自壯而趨老一失一口如牽牛羊以詣屠肆每進一步而去死轉近可不畏哉所以我佛不得已權誤方便引提迷人何者為性命何者為修行強而名之曰經若有豪傑丈夫自悟本體如何不假言詮則真經露矣這真經人人本有個個不無不因聖而會不因凡而減不用文字不必註解不勞刊印誦讀要知即刻就知一些不難若或不知萬般費力到底不知只要有此真經一切經典都無用處雖列錦軸牙籤祗為供奉之具耳如若真經不知不得不請出環函研窮蘊奧晝夜參詳至於用力之久一旦豁然貫通始為絕學無為大快樂之人也無法可說之言言不誣矣金剛經讀法十條金剛經語句重疊各有義理奧妙甚深非同法華楞嚴詳明易曉之可比讀者須細心參詳始見精微金剛經眷索愛語四菩薩乃慈悲喜捨四無量心吾身中之菩薩也讀者須先有此等心然後可入大道而悟金剛之義金剛經善信男女誦者甚多得證金剛者甚少皆因恃口頭語不知會悟妙法讀者須靜坐觀心心無其心然後取其註觀之庶幾有進金剛經無全部演說不開無後半部搜括不盡自十七分中復說云何應住一段收拾全旨無餘已後先詳者略之先略者詳之節節相承各有妙義金剛經言語雖多總是說真空無相妙理以化度眾生必眾生能安住降伏不生我人眾生壽者四相纔出到涅槃地位說布施者不過令修行易於入門原不甚重一經大義俱盡於應住之義自第五分之後許多說話不過反覆辨明無相之理恐人一著有相便不能安住降伏也金剛經佛說無相但去妄念不去天理若併天理去了未免行屍走肉虗生世間故於第十四分中說出生實相三字亦慮人之流於枯稿也吾儒不去細究反言佛氏虗無寂滅豈不罪過金剛經中佛言其大則謂須彌山王言其多則謂如恒河沙等言其久則謂如無量阿僧祗劫實因極大極多極久無盡之數也非如來形容過當亦非如來好為此等語以駭世俗讀者當求其理金剛經屢言布施葢有相布施固修行之不廢非可論金剛之妙義若有善信以身中至寶不生不滅乘香華雲入無邊界起光明臺供養十方則為見性之功勝此多矣金剛經依法出生分中若滿三千大千世界七寶布施不如持經之福無為福勝分中恒河沙世界七寶比大千又多矣亦不如持經之福如法受持分中以恒河沙等身命布施又不徒七寶矣較之受持解脫終不能勝持經功德分中以恒河沙等三廣身命布施視前又甚矣較之持經功德自為無量能淨業障分中自敘供養無量諸佛之多視七寶身命布施大有間矣亦不如持經解說之萬一福智無比分中以須彌山王之七寶比喻又大矣亦不能及持經解說之福言雖重疊一步緊一步者何也葢佛慈悲之大先知末法劫中多以布施當修行不知解說所以諄諄反復言之但此經乃見性要旨受持即得成佛豈布施之福所能比類哉勿謂佛先已說後為續聽法者重說非理也金剛經如來無相之義即非即是何去何來如水清則月見水濁則月隱水有清濁月無去來且如人忽思念他州則境界一時獨現這心從何處來少時心歇從何處去如此見徹便知無去無來矣
